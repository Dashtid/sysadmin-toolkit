name: Security Scanning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  # Secret Detection (merged from secret-scan.yml)
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287eb9b730d02a6ea74a31e29  # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@fb74f38f7d00949e1ddd4e49e59ba5dd17f2bb46  # v3.88.1
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.before }}
          head: HEAD
          extra_args: --only-verified

      - name: Scan for common secret patterns
        run: |
          echo "[i] Scanning for common secrets patterns..."

          PATTERNS=(
            "password\s*=\s*['\"][^'\"]*['\"]"
            "api[_-]?key\s*=\s*['\"][^'\"]*['\"]"
            "secret\s*=\s*['\"][^'\"]*['\"]"
            "token\s*=\s*['\"][^'\"]*['\"]"
            "BEGIN RSA PRIVATE KEY"
            "BEGIN OPENSSH PRIVATE KEY"
          )

          FOUND=0

          for pattern in "${PATTERNS[@]}"; do
            if grep -rniE "$pattern" . \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=tests \
              --exclude-dir=.githooks \
              --exclude="*.md" \
              --exclude="*.yml"; then
              echo "[-] Found potential secret: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "[-] Potential secrets found - review required"
            exit 1
          fi

          echo "[+] No secrets detected"

  # CodeQL Analysis
  codeql-analysis:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169  # v3.28.0
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169  # v3.28.0

  # Dependency Review (PRs only)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3571e49be25ba84783  # v4.5.0
        continue-on-error: true
        with:
          fail-on-severity: moderate

  # Trivy Vulnerability Scanner
  trivy-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169  # v3.28.0
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Check for outdated PowerShell modules
  powershell-modules-check:
    name: Check PowerShell Modules
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check for module updates
        shell: pwsh
        run: |
          Write-Host "[i] Checking for PowerShell module updates..."

          $modules = @('Pester', 'PSScriptAnalyzer')
          $outdated = @()

          foreach ($module in $modules) {
            try {
              $installed = Get-InstalledModule -Name $module -ErrorAction SilentlyContinue
              $available = Find-Module -Name $module -ErrorAction Stop

              if ($installed -and ($available.Version -gt $installed.Version)) {
                Write-Host "[!] $module is outdated: $($installed.Version) -> $($available.Version)"
                $outdated += $module
              } else {
                Write-Host "[+] $module is up to date"
              }
            } catch {
              Write-Host "[!] Could not check $module : $_"
            }
          }

          if ($outdated.Count -gt 0) {
            Write-Host "[!] $($outdated.Count) module(s) have updates available"
          } else {
            Write-Host "[+] All modules are up to date"
          }

  # License Compliance
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check for LICENSE file
        run: |
          if [ ! -f LICENSE ]; then
            echo "[-] LICENSE file not found"
            exit 1
          fi
          echo "[+] LICENSE file exists"

      - name: Verify LICENSE is MIT
        run: |
          if grep -q "MIT License" LICENSE; then
            echo "[+] MIT License confirmed"
          else
            echo "[!] License type verification needed"
          fi

  # Markdown Link Checker
  markdown-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@fc0405b50847c4904cc6aca4eb08004975a5b4a4  # v1.0.15
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'

  # Security Summary
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secret-detection, codeql-analysis, trivy-scan, license-check]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets | ${{ needs.secret-detection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL  | ${{ needs.codeql-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy   | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View details in the Security tab" >> $GITHUB_STEP_SUMMARY
